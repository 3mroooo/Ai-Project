<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Job Recommender | برنس التوصيات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.05)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            opacity: 0.3;
            pointer-events: none;
        }

        /* أنيميشن للجسيمات */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* بطاقة رئيسية فخمة */
        .main-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.2);
            transition: transform 0.3s ease;
        }

        .main-card:hover {
            transform: translateY(-5px);
        }

        /* هيدر فخم */
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(102,126,234,0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 40px rgba(102,126,234,0.4); }
            50% { transform: scale(1.05); box-shadow: 0 20px 60px rgba(102,126,234,0.6); }
        }

        .logo i {
            font-size: 50px;
            color: white;
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        /* أزرار التبويب الفخمة */
        .tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background: #f0f0f0;
            padding: 8px;
            border-radius: 60px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 30px;
            background: transparent;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tab-btn i {
            font-size: 1.2em;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        /* منطقة الإدخال */
        .input-area {
            background: #f8f9fa;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 14px;
            font-family: 'Cairo', monospace;
            resize: vertical;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .file-upload {
            border: 2px dashed #667eea;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .file-upload:hover {
            background: #f0f0ff;
            border-color: #764ba2;
        }

        .file-upload i {
            font-size: 50px;
            color: #667eea;
            margin-bottom: 10px;
        }

        /* زر البحث الفخم */
        .search-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        /* بطاقات النتائج */
        .results-grid {
            display: grid;
            gap: 20px;
            margin-top: 30px;
        }

        .result-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
            border: 1px solid rgba(102,126,234,0.2);
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .result-card:hover {
            transform: translateX(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .result-title {
            font-size: 1.4em;
            font-weight: 800;
            color: #333;
            margin-bottom: 10px;
        }

        .result-company {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-score {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .score-excellent { background: #4caf50; color: white; }
        .score-good { background: #ff9800; color: white; }
        .score-normal { background: #2196f3; color: white; }
        .score-low { background: #f44336; color: white; }

        .result-desc {
            color: #666;
            line-height: 1.6;
        }

        /* مؤشر التحميل */
        .loader {
            text-align: center;
            padding: 60px;
        }

        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        /* ستاتس بار فخم */
        .status-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            z-index: 100;
        }

        .status-online {
            background: #4caf50;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9em;
        }

        .status-offline {
            background: #f44336;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9em;
        }

        /* أنيميشنات */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden { display: none; }

        @media (max-width: 768px) {
            .main-card { padding: 20px; }
            h1 { font-size: 2em; }
            .tabs { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
    <div class="main-card">
        <div class="header">
            <div class="logo">
                <i class="fas fa-robot"></i>
            </div>
            <h1>🤖 AI Job Recommender</h1>
            <p class="subtitle">الذكاء الاصطناعي يوصي لك بأفضل الوظائف</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('text')">
                <i class="fas fa-keyboard"></i> كتابة النص
            </button>
            <button class="tab-btn" onclick="switchTab('file')">
                <i class="fas fa-upload"></i> رفع ملف
            </button>
        </div>

        <div id="text-tab" class="tab-content active">
            <div class="input-area">
                <textarea id="cv-text" placeholder="📄 اكتب الـ CV بتاعك هنا...
                
مثال:
أنا مطور Python خبرة 3 سنوات
أجيد SQL و Machine Learning
عملت على مشاريع تحليل بيانات..."></textarea>
                <button class="search-btn" onclick="recommendFromText()">
                    <i class="fas fa-magic"></i> ابحث عن وظائف
                </button>
            </div>
        </div>

        <div id="file-tab" class="tab-content">
            <div class="input-area">
                <div class="file-upload" onclick="document.getElementById('cv-file').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>اضغط لرفع ملف CV</p>
                    <small style="color:#999;">يدعم PDF, DOCX, TXT</small>
                </div>
                <input type="file" id="cv-file" accept=".txt,.pdf,.docx" style="display:none">
                <button class="search-btn" onclick="recommendFromFile()">
                    <i class="fas fa-magic"></i> تحليل و بحث
                </button>
            </div>
        </div>

        <div id="loading" class="loader hidden">
            <div class="loader-spinner"></div>
            <p style="color:#667eea; font-weight:bold;">🤖 الذكاء الاصطناعي يحلل CV الخاص بك...</p>
            <p style="color:#999; font-size:0.9em;">جاري البحث عن أفضل الوظائف المناسبة</p>
        </div>

        <div id="results" class="hidden">
            <h2 style="margin-bottom: 20px;"><i class="fas fa-trophy"></i> أفضل الوظائف المناسبة</h2>
            <div id="jobs-list" class="results-grid"></div>
        </div>

        <div id="error" class="error hidden"></div>
    </div>
</div>

<div class="status-bar">
    <div><i class="fas fa-microchip"></i> AI Engine v2.0</div>
    <div id="api-status"><i class="fas fa-circle"></i> جاري الاتصال...</div>
</div>

<script>
    const API_URL = 'http://localhost:5000';

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        if (tab === 'text') {
            document.querySelector('.tab-btn:first-child').classList.add('active');
            document.getElementById('text-tab').classList.add('active');
        } else {
            document.querySelector('.tab-btn:last-child').classList.add('active');
            document.getElementById('file-tab').classList.add('active');
        }
    }

    async function recommendFromText() {
        const cvText = document.getElementById('cv-text').value;
        if (!cvText.trim()) {
            showError('📝 من فضلك ادخل الـ CV text');
            return;
        }
        await recommend({ cv_text: cvText });
    }

    async function recommendFromFile() {
        const file = document.getElementById('cv-file').files[0];
        if (!file) {
            showError('📂 من فضلك اختار ملف CV');
            return;
        }
        
        const formData = new FormData();
        formData.append('cv', file);
        
        showLoading();
        
        try {
            const response = await fetch(`${API_URL}/recommend-file`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            hideLoading();
            if (response.ok) displayResults(data);
            else showError(data.error || 'حدث خطأ');
        } catch (error) {
            hideLoading();
            showError('❌ مشكلة في الاتصال بالسيرفر');
        }
    }

    async function recommend(data) {
        showLoading();
        try {
            const response = await fetch(`${API_URL}/recommend`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            hideLoading();
            if (response.ok) displayResults(result);
            else showError(result.error || 'حدث خطأ');
        } catch (error) {
            hideLoading();
            showError('❌ لا يمكن الاتصال بـ AI API');
        }
    }

    function displayResults(jobs) {
        const resultsDiv = document.getElementById('results');
        const jobsList = document.getElementById('jobs-list');
        
        if (!jobs || jobs.length === 0) {
            jobsList.innerHTML = '<p>لا توجد وظائف مناسبة حالياً</p>';
            resultsDiv.classList.remove('hidden');
            return;
        }
        
        jobsList.innerHTML = jobs.map((job, index) => {
            let scoreClass = 'score-low';
            if (job.match_score >= 80) scoreClass = 'score-excellent';
            else if (job.match_score >= 60) scoreClass = 'score-good';
            else if (job.match_score >= 40) scoreClass = 'score-normal';
            
            return `
                <div class="result-card">
                    <div class="result-title">
                        <i class="fas fa-briefcase"></i> ${job.job_title || 'وظيفة'}
                    </div>
                    <div class="result-company">
                        <i class="fas fa-building"></i> ${job.company || 'شركة'}
                    </div>
                    <div class="result-score ${scoreClass}">
                        <i class="fas fa-chart-line"></i> ${job.match_score || 0}% توافق
                    </div>
                    <div class="result-desc">
                        ${(job.job_description || '').substring(0, 250)}...
                    </div>
                </div>
            `;
        }).join('');
        
        resultsDiv.classList.remove('hidden');
        document.getElementById('error').classList.add('hidden');
    }

    function showLoading() {
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('results').classList.add('hidden');
        document.getElementById('error').classList.add('hidden');
    }

    function hideLoading() {
        document.getElementById('loading').classList.add('hidden');
    }

    function showError(message) {
        const errorDiv = document.getElementById('error');
        errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
        errorDiv.classList.remove('hidden');
        document.getElementById('results').classList.add('hidden');
    }

    async function checkAPI() {
        const statusDiv = document.getElementById('api-status');
        try {
            const response = await fetch(`${API_URL}/health`);
            if (response.ok) {
                statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> AI API Online';
                statusDiv.className = 'status-online';
            } else {
                statusDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> API Error';
                statusDiv.className = 'status-offline';
            }
        } catch (error) {
            statusDiv.innerHTML = '<i class="fas fa-plug"></i> API Offline - شغل python app.py';
            statusDiv.className = 'status-offline';
        }
    }

    // جسيمات متحركة
    function createParticles() {
        const container = document.getElementById('particles');
        for(let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.width = Math.random() * 5 + 'px';
            particle.style.height = particle.style.width;
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = 10 + Math.random() * 20 + 's';
            container.appendChild(particle);
        }
    }

    createParticles();
    checkAPI();
    setInterval(checkAPI, 5000);
</script>
</body>
</html>
